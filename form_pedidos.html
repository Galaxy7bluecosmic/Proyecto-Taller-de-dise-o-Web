<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Formulario de Pedido | BocadosDeAyuda</title>

    <link rel="stylesheet" href="assets/css/pages/formPedidos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/layout/grid-formPedidos.css">
    <link rel="stylesheet" href="assets/css/menu.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/cart.css">
    <link rel="stylesheet" href="assets/css/dinamico.css">
</head>

<body>
    <div class="contenedor_general">

        <!-- HEADER -->
        <header>
            <a href="index.html" class="logo_link">
                <div class="contenedor_logo">
                    <img src="img/tienda-de-comestibles.gif" width="50">
                    <h1>Bocados<span>DeAyuda</span></h1>
                </div>
            </a>

            <nav class="menu_principal">
                <a href="index.html">Inicio</a>
                <a href="menu.html">Menú</a>
                <a href="promociones.html">Promociones</a>
                <a href="pedidos.html">Pedidos</a>
            </nav>
        </header>

        <!-- TITULO -->
        <section class="titulo">
            <h2>Tu carrito de compras</h2>
            <p>Revisa tus productos antes de realizar el pago.</p>
        </section>

        <!-- GRID PRINCIPAL -->
        <section class="contenedor_carrito" data-carrito-lista></section>

        <!-- TOTAL -->
        <section class="total_compra">
            <div class="total_card">
                <h3>Total a pagar</h3>
                <span data-carrito-total>S/ 0.00</span>
                <button id="abrirModal">Pagar ahora</button>
            </div>
        </section>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modalPago">
        <div class="modal_contenido">
            <button class="cerrar_modal" type="button" data-cerrar-pago>×</button>
            <h2>Método de pago</h2>
            <div class="metodos_pago">
                <button class="metodo activo" type="button" data-metodo="tarjeta">Tarjeta</button>
                <button class="metodo" type="button" data-metodo="yape">Yape</button>
                <button class="metodo" type="button" data-metodo="efectivo">Efectivo</button>
            </div>

            <form id="formPago">
                <div data-campos-pago></div>
            </form>
        </div>
    </div>

    <!-- LOADING -->
    <div class="pantalla_carga" id="pantallaCarga">
        <div class="loader">
            <div class="spinner"></div>
            <h2>Procesando pago...</h2>
        </div>
    </div>

    <script type="module" src="assets/js/site.js?v=8"></script>
</body>
</html>
